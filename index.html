<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glyph Generation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Static Demo</p>
      <h1>Glyph Generation</h1>
      <p class="lede">
        This is the JSFiddle export split into separate HTML, CSS, and JavaScript files so it can be
        edited like a normal project and published directly with GitHub Pages.
      </p>
    </header>

    <section class="workspace">
      <div class="workspace-controls" aria-label="Brush preview controls">
        <label class="control-card" for="brush-angle">
          <span class="control-heading">
            <span class="control-label">Nib Angle</span>
            <output id="brush-angle-value" for="brush-angle">30°</output>
          </span>
          <input id="brush-angle" type="range" min="0" max="180" step="1" value="30">
        </label>

        <label class="control-card" for="brush-thickness">
          <span class="control-heading">
            <span class="control-label">Thickness</span>
            <output id="brush-thickness-value" for="brush-thickness">8</output>
          </span>
          <input id="brush-thickness" type="range" min="2" max="18" step="0.5" value="8">
        </label>
      </div>

      <div class="canvas-frame">
        <div id="canvas" aria-label="Generated glyphs"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
