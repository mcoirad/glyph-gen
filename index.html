<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glyph Generation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Static Demo</p>
      <h1>Glyph Generation</h1>
      <p class="lede">
        This is the JSFiddle export split into separate HTML, CSS, and JavaScript files so it can be
        edited like a normal project and published directly with GitHub Pages.
      </p>
    </header>

    <section class="workspace">
      <div class="workspace-controls" aria-label="Brush preview controls">
        <label class="control-card control-card--select" for="glyph-set">
          <span class="control-heading">
            <span class="control-label">Glyph Set</span>
          </span>
          <select id="glyph-set"></select>
        </label>

        <label class="control-card control-card--select" for="brush-profile">
          <span class="control-heading">
            <span class="control-label">Brush Profile</span>
          </span>
          <select id="brush-profile">
            <option value="segment">Segment</option>
            <option value="circle">Circle</option>
            <option value="rectangle">Rectangle</option>
          </select>
        </label>

        <label class="control-card" for="segment-angle" data-profile-controls="segment">
          <span class="control-heading">
            <span class="control-label">Nib Angle</span>
            <output id="segment-angle-value" for="segment-angle">30°</output>
          </span>
          <input id="segment-angle" type="range" min="0" max="180" step="1" value="30">
        </label>

        <label class="control-card" for="segment-length" data-profile-controls="segment">
          <span class="control-heading">
            <span class="control-label">Length</span>
            <output id="segment-length-value" for="segment-length">8</output>
          </span>
          <input id="segment-length" type="range" min="2" max="18" step="0.5" value="8">
        </label>

        <label class="control-card" for="circle-diameter" data-profile-controls="circle" hidden>
          <span class="control-heading">
            <span class="control-label">Diameter</span>
            <output id="circle-diameter-value" for="circle-diameter">8</output>
          </span>
          <input id="circle-diameter" type="range" min="2" max="18" step="0.5" value="8">
        </label>

        <label class="control-card" for="circle-taper-start" data-profile-controls="circle" hidden>
          <span class="control-heading">
            <span class="control-label">Taper In</span>
            <output id="circle-taper-start-value" for="circle-taper-start">0%</output>
          </span>
          <input id="circle-taper-start" type="range" min="0" max="100" step="5" value="0">
        </label>

        <label class="control-card" for="circle-taper-end" data-profile-controls="circle" hidden>
          <span class="control-heading">
            <span class="control-label">Taper Out</span>
            <output id="circle-taper-end-value" for="circle-taper-end">0%</output>
          </span>
          <input id="circle-taper-end" type="range" min="0" max="100" step="5" value="0">
        </label>

        <label class="control-card" for="rectangle-angle" data-profile-controls="rectangle" hidden>
          <span class="control-heading">
            <span class="control-label">Rectangle Angle</span>
            <output id="rectangle-angle-value" for="rectangle-angle">30°</output>
          </span>
          <input id="rectangle-angle" type="range" min="0" max="180" step="1" value="30">
        </label>

        <label class="control-card" for="rectangle-width" data-profile-controls="rectangle" hidden>
          <span class="control-heading">
            <span class="control-label">Width</span>
            <output id="rectangle-width-value" for="rectangle-width">10</output>
          </span>
          <input id="rectangle-width" type="range" min="2" max="20" step="0.5" value="10">
        </label>

        <label class="control-card" for="rectangle-height" data-profile-controls="rectangle" hidden>
          <span class="control-heading">
            <span class="control-label">Height</span>
            <output id="rectangle-height-value" for="rectangle-height">4</output>
          </span>
          <input id="rectangle-height" type="range" min="2" max="16" step="0.5" value="4">
        </label>
      </div>

      <div class="canvas-frame">
        <div id="canvas" aria-label="Generated glyphs"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
